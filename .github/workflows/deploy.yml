name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: Check build output
        run: |
          echo "=== dist/ ===" && ls -la dist/ 2>/dev/null || echo "dist/ not found"
          echo "=== dist/server/ ===" && ls -la dist/server/ 2>/dev/null || echo "dist/server/ not found"
          echo "=== dist/client/ ===" && ls -la dist/client/ 2>/dev/null || echo "dist/client/ not found"
          echo "=== .output/ ===" && ls -la .output/ 2>/dev/null || echo ".output/ not found"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
