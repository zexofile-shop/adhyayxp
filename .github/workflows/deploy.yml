name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy
        run: |
          if [ -f ".output/server/index.js" ]; then
            wrangler deploy .output/server/index.js --name adhyayxp --compatibility-date 2024-11-01 --compatibility-flag nodejs_compat --assets .output/public
          elif [ -f "dist/server/index.js" ]; then
            wrangler deploy dist/server/index.js --name adhyayxp --compatibility-date 2024-11-01 --compatibility-flag nodejs_compat --assets dist/client
          elif [ -f "dist/server/server.js" ]; then
            wrangler deploy dist/server/server.js --name adhyayxp --compatibility-date 2024-11-01 --compatibility-flag nodejs_compat --assets dist/client
          else
            echo "Build output:" && find . -not -path "*/node_modules/*" -name "*.js" -path "*server*"
            wrangler deploy
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
